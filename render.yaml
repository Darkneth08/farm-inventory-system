services:
  - type: web
    name: farm-inventory-system
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Farm Supply Inventory
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: farm-inventory-db
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: farm-inventory-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: RUN_DEMO_SEEDER
        value: "true"

databases:
  - name: farm-inventory-db
    plan: free
    region: singapore
    databaseName: farm_inventory
    user: farm_inventory_user
