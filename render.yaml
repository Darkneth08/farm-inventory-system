services:
  - type: web
    name: farm-inventory-system
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Farm Supply Inventory
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: database/database.sqlite
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: RUN_DEMO_SEEDER
        value: "true"
